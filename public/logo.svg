<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 56" width="260" height="56">
  <!-- Icon background -->
  <rect x="0" y="0" width="56" height="56" rx="12" fill="#14b8a6"/>

  <!-- BrainCircuit icon (white, centered in box) -->
  <g transform="translate(28,28)" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Brain left lobe -->
    <path d="M-2,-10 C-8,-10 -12,-6 -12,-1 C-12,2 -10,5 -7,7 C-8,8 -9,10 -9,12 C-9,14 -7,16 -5,16"/>
    <!-- Brain right lobe -->
    <path d="M2,-10 C8,-10 12,-6 12,-1 C12,2 10,5 7,7 C8,8 9,10 9,12 C9,14 7,16 5,16"/>
    <!-- Center line -->
    <line x1="0" y1="-10" x2="0" y2="16"/>
    <!-- Circuit horizontal lines -->
    <line x1="-12" y1="3" x2="-16" y2="3"/>
    <line x1="12" y1="3" x2="16" y2="3"/>
    <!-- Circuit nodes -->
    <circle cx="-16" cy="3" r="1.5" fill="#ffffff" stroke="none"/>
    <circle cx="16" cy="3" r="1.5" fill="#ffffff" stroke="none"/>
    <circle cx="0" cy="-10" r="1.5" fill="#ffffff" stroke="none"/>
    <!-- Circuit bottom -->
    <line x1="-5" y1="16" x2="5" y2="16"/>
    <line x1="0" y1="16" x2="0" y2="20"/>
    <circle cx="0" cy="20" r="1.5" fill="#ffffff" stroke="none"/>
  </g>

  <!-- "SequenceLab AI" text -->
  <text x="72" y="22" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="700" fill="#14b8a6" letter-spacing="0.3">SequenceLab</text>
  <text x="72" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="700" fill="#e2e8f0" letter-spacing="1.5">AI</text>
  <text x="104" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="400" fill="#94a3b8" letter-spacing="0.5">RNN · LSTM · GRU</text>
</svg>
