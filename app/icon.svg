<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="7" fill="#14b8a6"/>
  <g transform="translate(16,16)" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Brain left lobe -->
    <path d="M-1,-7 C-5,-7 -8,-4 -8,-1 C-8,1 -7,3 -5,4 C-5.5,5 -6,6.5 -6,8"/>
    <!-- Brain right lobe -->
    <path d="M1,-7 C5,-7 8,-4 8,-1 C8,1 7,3 5,4 C5.5,5 6,6.5 6,8"/>
    <!-- Center spine -->
    <line x1="0" y1="-7" x2="0" y2="8"/>
    <!-- Horizontal circuit lines -->
    <line x1="-8" y1="1" x2="-11" y2="1"/>
    <line x1="8" y1="1" x2="11" y2="1"/>
    <!-- Nodes -->
    <circle cx="-11" cy="1" r="1.2" fill="#ffffff" stroke="none"/>
    <circle cx="11" cy="1" r="1.2" fill="#ffffff" stroke="none"/>
    <circle cx="0" cy="-7" r="1.2" fill="#ffffff" stroke="none"/>
    <!-- Bottom node -->
    <line x1="-6" y1="8" x2="6" y2="8"/>
    <circle cx="0" cy="8" r="1.2" fill="#ffffff" stroke="none"/>
  </g>
</svg>
